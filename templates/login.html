<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FloraFlow — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1b4332, #40916c, #95d5b2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loginCard {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .logoText {
            font-size: 2rem;
            font-weight: 700;
            color: #1b4332;
        }

        .logoLeaf {
            color: #40916c;
        }

        .btn-flora {
            background: linear-gradient(135deg, #1b4332, #40916c);
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn-flora:hover {
            background: linear-gradient(135deg, #40916c, #1b4332);
            color: white;
        }

        .form-control:focus {
            border-color: #40916c;
            box-shadow: 0 0 0 0.2rem rgba(64, 145, 108, 0.25);
        }
    </style>
</head>

<body>
    <div class="loginCard">
        <div class="text-center mb-4">
            <div class="logoText"> Flora<span class="logoLeaf">Flow</span></div>
            <p class="text-muted mt-1">Nursery Management System</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-muted">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-flora">Login</button>
        </form>
    </div>
</body>

</html>
