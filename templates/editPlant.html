{% extends 'base.html' %}
{% block title %}Edit Plant{% endblock %}
{% block pageTitle %}<i class="bi bi-pencil me-2"></i>Edit Plant{% endblock %}

{% block content %}
<div class="card p-4">
    <form method="POST">
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Plant Name</label>
                <input type="text" name="plantName" class="form-control" value="{{ plant.plantName }}" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Category</label>
                <select name="categoryId" class="form-select" required>
                    {% for cat in categories %}
                    <option value="{{ cat.categoryId }}" {% if cat.categoryId==plant.categoryId %}selected{% endif %}>
                        {{ cat.categoryName }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2 mb-3">
                <label class="form-label">Price (Rs.)</label>
                <input type="number" name="price" step="0.01" class="form-control" value="{{ plant.price }}" required>
            </div>
            <div class="col-md-2 mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" name="quantity" class="form-control" value="{{ plant.quantity }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Description</label>
                <input type="text" name="description" class="form-control" value="{{ plant.description }}">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Care Instructions</label>
                <input type="text" name="careInstructions" class="form-control" value="{{ plant.careInstructions }}">
            </div>
        </div>
        <button type="submit" class="btn btn-flora px-4">
            <i class="bi bi-save me-2"></i>Save Changes
        </button>
        <a href="/plants" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
