<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FloraFlow Database Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3>System Status</h3>
            </div>
            <div class="card-body text-center">
                <h1 class="display-6">{{ status }}</h1>
                <p class="lead mt-3">{{ message }}</p>
                <hr>
                <small class="text-muted">FloraFlow Project - Backend Connectivity Test</small>
            </div>
        </div>
    </div>
</body>

</html>
