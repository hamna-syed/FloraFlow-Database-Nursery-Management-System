{% extends 'base.html' %}
{% block title %}Edit Accessory{% endblock %}
{% block pageTitle %}<i class="bi bi-pencil me-2"></i>Edit Accessory{% endblock %}

{% block content %}
<div class="card p-4">
    <form method="POST">
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Accessory Name</label>
                <input type="text" name="accessoryName" class="form-control" value="{{ accessory.accessoryName }}"
                    required>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Price (Rs.)</label>
                <input type="number" name="price" step="0.01" class="form-control" value="{{ accessory.price }}"
                    required>
            </div>
            <div class="col-md-2 mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" name="quantity" class="form-control" value="{{ accessory.quantity }}" required>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Description</label>
                <input type="text" name="description" class="form-control" value="{{ accessory.description }}">
            </div>
        </div>
        <button type="submit" class="btn btn-flora px-4">
            <i class="bi bi-save me-2"></i>Save Changes
        </button>
        <a href="/accessories" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
